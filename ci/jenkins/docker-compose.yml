# Docker Compose for Jenkins with JCasC and Job DSL
#
# This creates a fully configured Jenkins instance with:
# - Jenkins Configuration as Code (JCasC)
# - Job DSL plugin for job automation
# - All required plugins pre-installed
#
# Usage:
#   docker-compose up -d
#
# Access Jenkins at: http://localhost:8080
# Default credentials: admin / admin (change JENKINS_ADMIN_PASSWORD)

version: '3.8'

services:
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-openjdk-build
    restart: unless-stopped

    ports:
      - "8080:8080"
      - "50000:50000"

    environment:
      # JCasC configuration
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc_configs/jenkins.yaml
      - JENKINS_ADMIN_PASSWORD=${JENKINS_ADMIN_PASSWORD:-admin}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}

      # Java options
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false -Xmx2g

    volumes:
      # Persist Jenkins data
      - jenkins_home:/var/jenkins_home

      # Mount JCasC configuration
      - ./jcasc:/var/jenkins_home/casc_configs:ro

      # Mount plugins list
      - ./plugins.txt:/usr/share/jenkins/ref/plugins.txt:ro

    networks:
      - jenkins

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/login"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Optional: Jenkins agent for distributed builds
  jenkins-agent:
    image: jenkins/inbound-agent:latest-jdk17
    container_name: jenkins-agent-1
    restart: unless-stopped

    environment:
      - JENKINS_URL=http://jenkins:8080
      - JENKINS_AGENT_NAME=agent-1
      - JENKINS_AGENT_WORKDIR=/home/jenkins/agent

    volumes:
      - jenkins_agent_workdir:/home/jenkins/agent

    networks:
      - jenkins

    depends_on:
      jenkins:
        condition: service_healthy

volumes:
  jenkins_home:
    driver: local
  jenkins_agent_workdir:
    driver: local

networks:
  jenkins:
    driver: bridge

